<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order - Le Coffe</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

<section class="order-container">
    <div class="order-card">
        <h1>Place Your Order</h1>

        <form action="#" method="POST" class="order-form">
            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" name="nama" placeholder="Masukan Nama Anda" required>
            </div>

            <div class="form-group">
                <label for="hp">Nomor WhatsApp</label>
                <input type="tel" id="hp" name="hp" placeholder="Masukkan No HP Anda" required>
            </div>

            <div class="form-group">
                <label for="alamat">Alamat Pengiriman</label>
                <textarea id="alamat" name="alamat" rows="4" placeholder="Tulis Alamat Lengkap Anda" required></textarea>
            </div>

            <button type="submit" class="btn-order">Pesan Sekarang</button>
        </form>
    </div>
</section>

</body>
</html>
